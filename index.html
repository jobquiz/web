<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bengal Fusion Tools Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Noto+Serif+Bengali:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* মূল ওয়েবসাইটের ইউনিক ডিজাইন */
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #050810; /* আরও গভীর ডার্ক */
            color: #e2e8f0;
            margin: 0;
            padding: 40px 20px;
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100' viewBox='0 0 100 100'><circle cx='50' cy='50' r='1' fill='rgba(255,255,255,0.05)'/></svg>"); /* হালকা স্টারি ব্যাকগ্রাউন্ড */
        }

        /* বেঙ্গল ফোক আর্ট টাইটেল ব্যানার */
        .page-header {
            text-align: center;
            margin-bottom: 60px;
            position: relative;
            padding: 20px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 20px;
            border: 2px solid;
            border-image: linear-gradient(135deg, #f01e8c, #fcc21c, #0d88e0, #40c040) 1; /* রিকশা আর্টের চার রঙা বর্ডার */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .page-header h2 {
            font-family: 'Noto Serif Bengali', serif; /* বাংলা টাইটেলের জন্য সেরিফ ফন্ট */
            font-size: 42px;
            font-weight: 800;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #f8fafc, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .page-header p {
            color: #94a3b8;
            font-size: 16px;
            margin: 0;
            font-weight: 500;
        }

        /* গ্রিড সিস্টেম */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 35px;
            max-width: 1350px;
            margin: 0 auto;
        }

        /* কার্ডের ইউনিক ডিজাইন (আলপনা মোটিফ বর্ডার) */
        .card {
            background-color: #111827;
            border-radius: 24px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            /* আলপনা মোটিফ অনুপ্রাণিত বর্ডার */
            border: 3px solid #1f2937;
        }

        /* কার্ডে মাউস নিলে (Hover) রিকশা আর্টের মতো গ্লো */
        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: #fcc21c; /* উজ্জ্বল হলুদ বর্ডার */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 30px rgba(252, 194, 28, 0.2);
        }

        /* প্রিভিউ বক্সের ম্যাক ওএস স্টাইল হেডার (তবে ফোক আর্ট কালার) */
        .browser-header {
            height: 32px;
            background-color: #0a0f1d;
            display: flex;
            align-items: center;
            padding: 0 18px;
            gap: 8px;
            border-bottom: 2px solid #1f2937;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        /* রিকশা আর্টের সিগনেচার রং */
        .dot.red { background-color: #f01e8c; }
        .dot.yellow { background-color: #fcc21c; }
        .dot.green { background-color: #40c040; }

        /* প্রিভিউ বক্স */
        .preview-box {
            width: 100%;
            height: 230px;
            background-color: #ffffff; 
            position: relative;
            overflow: hidden;
        }

        .preview-box iframe {
            width: 1000px;
            height: 800px;
            border: none;
            transform: scale(0.38); 
            transform-origin: top left;
            pointer-events: none; 
        }

        /* কার্ডের নিচের টেক্সট অংশ (কালারফুল গ্রেডিয়েন্ট) */
        .card-content {
            padding: 26px;
            position: relative;
            background: linear-gradient(to bottom right, #111827, #080c14);
            flex-grow: 1;
            border-top: 2px solid #1f2937;
        }

        .domain-name {
            font-size: 11px;
            font-weight: 700;
            color: #fcc21c;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-title {
            font-family: 'Noto Serif Bengali', serif; /* কার্ড টাইটেলের জন্যও বাংলা ফন্ট */
            font-size: 20px;
            font-weight: 700;
            color: #f1f5f9;
            margin: 0;
            line-height: 1.4;
            letter-spacing: -0.5px;
        }

        /* হোভার করলে ইউনিক ফোক আর্ট তীর আইকন আসবে */
        .open-icon {
            position: absolute;
            right: 26px;
            bottom: 26px;
            color: #fcc21c;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s ease;
        }

        .card:hover .open-icon {
            opacity: 1;
            transform: scale(1);
        }

        /* টেক্সট এরিয়া লুকানো থাকবে */
        .hidden-codes {
            display: none;
        }
    </style>
</head>
<body>

    <div class="page-header">
        <h2>Developer Tools Workspace</h2>
        <p>Manage and access all your custom HTML tools in one place</p>
    </div>

    <div id="tool-grid" class="grid-container"></div>


    <div class="hidden-codes">

        <textarea id="tool-1-code">
            <h1>Fee Receipt Tool (কোড পেস্ট করুন)</h1>
        </textarea>

        <textarea id="tool-2-code">
            <h1>Student ID Tool (কোড পেস্ট করুন)</h1>
        </textarea>

        <textarea id="tool-3-code">
            <h1>Student ID Basic (কোড পেস্ট করুন)</h1>
        </textarea>

    </div>


    <script>
        const toolsDataFromBackend = [
            {
                title: "University Fee Receipt Generator",
                domain: "LOCAL HTML TOOL",
                codeId: "tool-1-code" 
            },
            {
                title: "Advanced Student ID Card Generator",
                domain: "LOCAL HTML TOOL",
                codeId: "tool-2-code" 
            },
            {
                title: "Student ID Card Generator (Basic)",
                domain: "LOCAL HTML TOOL",
                codeId: "tool-3-code" 
            }
        ];

        // নতুন ট্যাবে HTML কোডটি ওপেন করার ফাংশন
        function openToolInNewTab(index) {
            const codeId = toolsDataFromBackend[index].codeId;
            const toolCode = document.getElementById(codeId).value; 
            
            const newWindow = window.open();
            newWindow.document.open();
            newWindow.document.write(toolCode);
            newWindow.document.close();
        }

        // কার্ডগুলো স্ক্রিনে রেন্ডার করার ফাংশন
        function renderTools() {
            const grid = document.getElementById('tool-grid');
            grid.innerHTML = ''; 

            toolsDataFromBackend.forEach((tool, index) => {
                const rawCode = document.getElementById(tool.codeId).value;

                // SVG Icons (কালচারাল মোটিফ)
                const boatIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 18H2a4 4 0 0 0 4 4h12a4 4 0 0 0 4-4z"></path><path d="M10 10V3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v7"></path><path d="m22 10-5 8H7l-5-8z"></path></svg>`;
                const birdIcon = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3"></path><path d="M8 3a3 3 0 0 1 3 3v12a3 3 0 0 1-3 3"></path><path d="M12 8c-1.5-1.5-3-2-5-2-1.7 0-3 1.3-3 3s1.3 3 3 3c2 0 3.5.5 5 2"></path><path d="M12 8c1.5-1.5 3-2 5-2 1.7 0 3 1.3 3 3s1.3 3 3 3c-2 0-3.5.5-5 2"></path><path d="M12 16v6"></path><path d="M12 2v2"></path></svg>`;

                // কার্ড তৈরি করা হচ্ছে
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openToolInNewTab(index);

                // ব্রাউজার হেডার ও প্রিভিউ বক্স
                const previewSection = `
                    <div class="browser-header">
                        <div class="dot red"></div>
                        <div class="dot yellow"></div>
                        <div class="dot green"></div>
                    </div>
                    <div class="preview-box">
                        <iframe srcdoc="${rawCode.replace(/"/g, '&quot;')}"></iframe>
                    </div>
                `;

                // কার্ডের টেক্সট ও হোভার আইকন
                const contentSection = `
                    <div class="card-content">
                        <div class="domain-name">
                            ${boatIcon} ${tool.domain}
                        </div>
                        <h3 class="tool-title">${tool.title}</h3>
                        <div class="open-icon">
                            ${birdIcon}
                        </div>
                    </div>
                `;

                card.innerHTML = previewSection + contentSection;
                grid.appendChild(card);
            });
        }

        window.onload = renderTools;
    </script>

</body>
</html>
